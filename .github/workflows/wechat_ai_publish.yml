name: WeChat AI Article Publish

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'AI 模型选择'
        required: false
        default: 'gemini-2.5-flash'
        type: choice
        options:
          - gemini-2.5-flash
          - gemini-2.5-pro
          - gemini-3-pro-preview
          - claude-sonnet-4
      max_articles:
        description: '最大生成文章数'
        required: false
        default: '10'
        type: string

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract Matrix Secrets
        id: set-matrix
        run: |
          MAP_FILE="scripts/wechat/wechat_accounts_map.json"
          if [ -f "$MAP_FILE" ]; then
            MATRIX_JSON=$(jq -c 'values' $MAP_FILE)
            if [ "$MATRIX_JSON" == "[]" ] || [ -z "$MATRIX_JSON" ]; then
               echo "Warning: Account map is empty. Using default."
               MATRIX_JSON='["DEFAULT_NULL_ACC"]'
            fi
            echo "matrix=${MATRIX_JSON}" >> "$GITHUB_OUTPUT"
            echo "Matrix allocated: $MATRIX_JSON"
          else
            echo "Account map not found! Using single default."
            echo 'matrix=["DEFAULT_NULL_ACC"]' >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: setup-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        account_id: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}

    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git config --global pull.rebase true

      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk
          pip install poetry
          poetry install

      - name: Install Playwright Browsers
        run: poetry run playwright install chromium firefox

      - name: Cache CLIProxyAPI Binary
        uses: actions/cache@v4
        with:
          path: .cliproxy_bin
          key: cliproxy-${{ runner.os }}-${{ runner.arch }}
          restore-keys: |
            cliproxy-${{ runner.os }}-

      - name: Run AI Article Publisher
        id: publisher
        env:
          TARGET_ACCOUNT_ID: ${{ matrix.account_id }}
          WECHAT_AUTH_STATE_JSON: ${{ secrets[format('WECHAT_AUTH_STATE_JSON_{0}', matrix.account_id)] }}
          WECHAT_HEADLESS: "true"
          MAX_PUBLISH_COUNT: ${{ inputs.max_articles || '10' }}
          # ─── CLIProxyAPI 凭证 ───
          CPA_API_KEY: ${{ secrets.CPA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CPA_MODEL: ${{ inputs.model || 'gemini-2.5-flash' }}
          # ─── 可选：第三方 OpenAI 兼容 API ───
          OPENAI_COMPAT_BASE_URL: ${{ secrets.OPENAI_COMPAT_BASE_URL }}
          OPENAI_COMPAT_API_KEY: ${{ secrets.OPENAI_COMPAT_API_KEY }}
          # ─── 可选：AI 创作配置 ───
          AI_ARTICLE_TOPICS: ${{ secrets.AI_ARTICLE_TOPICS }}
          AI_SYSTEM_PROMPT: ${{ secrets.AI_SYSTEM_PROMPT }}
          WECHAT_DEFAULT_AUTHOR: "bhrum"
        run: |
          poetry run python scripts/wechat/publish_ai_articles.py

      - name: Final Status Push
        if: always()
        run: |
          git add "sucai"
          git diff --staged --quiet || git commit -m "chore: final AI publish status for ${{ matrix.account_id }}"
          git pull --rebase origin main || echo "No rebase needed"
          git push origin HEAD:main || echo "Final push bypassed"

      - name: Trigger Follow-up Run
        if: steps.publisher.outputs.trigger_next == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "Queue not fully processed. Re-triggering..."
          gh workflow run wechat_ai_publish.yml -f model=${{ inputs.model || 'gemini-2.5-flash' }} -f max_articles=${{ inputs.max_articles || '10' }}
