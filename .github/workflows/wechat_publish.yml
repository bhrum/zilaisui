name: WeChat Publish (CSV + AI)

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'AI 模型 (仅在 AI 自动创作模式生效)'
        required: false
        default: 'gemini-2.5-flash'
        type: choice
        options:
          - gemini-2.5-flash
          - gemini-2.5-pro
          - gemini-3-pro-preview
          - claude-sonnet-4
      ai_batch_size:
        description: 'AI 每轮生成文章数 (仅在 AI 模式生效)'
        required: false
        default: '5'
        type: string
      max_publish:
        description: '本轮最大发布数'
        required: false
        default: '50'
        type: string

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract Matrix Secrets
        id: set-matrix
        run: |
          MAP_FILE="scripts/wechat/wechat_accounts_map.json"
          if [ -f "$MAP_FILE" ]; then
            MATRIX_JSON=$(jq -c 'values' $MAP_FILE)
            if [ "$MATRIX_JSON" == "[]" ] || [ -z "$MATRIX_JSON" ]; then
               echo "Warning: Account map is empty. Using default."
               MATRIX_JSON='["DEFAULT_NULL_ACC"]'
            fi
            echo "matrix=${MATRIX_JSON}" >> "$GITHUB_OUTPUT"
            echo "Matrix allocated: $MATRIX_JSON"
          else
            echo "Account map not found! Please run matrix_auth.py first."
            exit 1
          fi

  publish:
    needs: setup-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        account_id: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}

    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git config --global pull.rebase true

      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk
          pip install poetry
          poetry install

      - name: Install Playwright Browsers
        run: poetry run playwright install chromium firefox

      - name: Cache CLIProxyAPI Binary
        uses: actions/cache@v4
        with:
          path: .cliproxy_bin
          key: cliproxy-${{ runner.os }}-${{ runner.arch }}
          restore-keys: |
            cliproxy-${{ runner.os }}-

      - name: Run Unified Publisher
        id: publisher
        env:
          # ─── 矩阵账号参数 ───
          TARGET_ACCOUNT_ID: ${{ matrix.account_id }}
          WECHAT_AUTH_STATE_JSON: ${{ secrets[format('WECHAT_AUTH_STATE_JSON_{0}', matrix.account_id)] }}
          WECHAT_HEADLESS: "true"
          MAX_PUBLISH_COUNT: ${{ inputs.max_publish || '50' }}
          WECHAT_DEFAULT_AUTHOR: "bhrum"
          # ─── AI 创作参数 (仅 CSV 清空后触发) ───
          CPA_API_KEY: ${{ secrets.CPA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CPA_MODEL: ${{ inputs.model || 'gemini-2.5-flash' }}
          AI_BATCH_SIZE: ${{ inputs.ai_batch_size || '5' }}
          OPENAI_COMPAT_BASE_URL: ${{ secrets.OPENAI_COMPAT_BASE_URL }}
          OPENAI_COMPAT_API_KEY: ${{ secrets.OPENAI_COMPAT_API_KEY }}
        run: |
          poetry run python scripts/wechat/publish_batch_scheduled.py

      - name: Final Status Push
        if: always()
        run: |
          git add "sucai"
          git diff --staged --quiet || git commit -m "chore: final status for Node ${{ matrix.account_id }}"
          git pull --rebase origin main || echo "No rebase needed"
          git push origin HEAD:main || echo "Final push bypassed"

      - name: Trigger Follow-up Run
        if: steps.publisher.outputs.trigger_next == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "Queue not fully processed or AI mode active. Re-triggering..."
          gh workflow run wechat_publish.yml \
            -f model=${{ inputs.model || 'gemini-2.5-flash' }} \
            -f ai_batch_size=${{ inputs.ai_batch_size || '5' }} \
            -f max_publish=${{ inputs.max_publish || '50' }}
